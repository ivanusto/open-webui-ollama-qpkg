# Open WebUI + Ollama QPKG configuration
# Built with QDK (qbuild). See https://github.com/qnap-dev/QDK

# Name of the packaged application.
# NOTE: deliberately not "OpenWebUI" or "Ollama" alone — avoids colliding
# with any current/future QNAP Store app of that internal name (App
# Center treats a name collision as the same app and force-"updates"
# over it; this bit us on the roon-qpkg project).
QPKG_NAME="OpenWebUIOllama"
# Name of the display application.
QPKG_DISPLAY_NAME="Open WebUI + Ollama"
# Version of the packaged application.
QPKG_VER="1.0.0"
# Author or maintainer of the package.
QPKG_AUTHOR="open-webui-ollama-qpkg contributors"
# License for the packaged application.
QPKG_LICENSE="MIT"
# One-line description of the packaged application.
QPKG_SUMMARY="Open WebUI + Ollama via their official Docker images (ollama/ollama, ghcr.io/open-webui/open-webui). Thin QPKG shell: management scripts + a first-run status page only; both containers are created by Container Station in the background."

# Preferred number in start/stop sequence.
QPKG_RC_NUM="150"
# Init-script used to control the daemon.
QPKG_SERVICE_PROGRAM="openwebui-ollama.sh"

# Package dependencies. Container Station provides the docker CLI.
QPKG_REQUIRE="container-station >= 3.0"

# Minimum QTS version.
QTS_MINI_VERSION="5.0.0"

# Location of the web interface. Open WebUI itself IS the app's web UI,
# so the App Center "Open" button goes straight to it; during the
# first-run image pull a lightweight status page occupies the same port.
QPKG_WEBUI="/"
QPKG_WEB_PORT="3000"

# Location of icons for the packaged application.
QDK_DATA_DIR_ICONS="icons"
# Location of files specific to x86_64 packages.
QDK_DATA_DIR_X86_64="x86_64"
# Location of files common to all architectures.
QDK_DATA_DIR_SHARED="shared"
